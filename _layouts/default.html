<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <a href="{{ '/' | relative_url }}" class="header-logo">
          <span class="logo-icon" aria-hidden="true">&#9671;</span>
          {{ site.title }}
        </a>
        <p class="header-tagline">{{ site.description }}</p>
      </div>
      <nav class="header-nav" aria-label="メインナビゲーション">
        <a href="{{ '/' | relative_url }}">サマリー</a>
        <a href="{{ '/feature-analysis-agent-multiagent' | relative_url }}">Agent</a>
        <a href="{{ '/feature-analysis-config-enterprise' | relative_url }}">Config</a>
        <a href="{{ '/feature-analysis-dx-ui' | relative_url }}">DX/UI</a>
        <a href="{{ '/feature-analysis-hooks-extensibility' | relative_url }}">Hooks</a>
        <a href="{{ '/feature-analysis-mcp-integration' | relative_url }}">MCP</a>
      </nav>
    </div>
  </header>

  <main class="site-content">
    <article class="content-body">
      {{ content }}
    </article>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>Claude Code 新機能分析 &mdash; v2.0.73〜v2.1.76</p>
      <p class="footer-meta">Powered by <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a></p>
    </div>
  </footer>

  <button class="back-to-top" id="backToTop" aria-label="ページ上部へ戻る" title="ページ上部へ戻る">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 13 10 8 5 13"/>
    </svg>
  </button>

  <script>
  (function() {
    // Back to top button
    var btn = document.getElementById('backToTop');
    window.addEventListener('scroll', function() {
      btn.classList.toggle('visible', window.scrollY > 400);
    });
    btn.addEventListener('click', function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Wrap star characters in colored spans
    function colorStars(el) {
      if (!el.innerHTML.match(/[★☆]/)) return;
      el.innerHTML = el.innerHTML.replace(/★/g, '<span class="star filled">★</span>');
      el.innerHTML = el.innerHTML.replace(/☆/g, '<span class="star empty">☆</span>');
    }
    document.querySelectorAll('.content-body h2, .content-body h3, .content-body h4, .content-body p, .content-body td, .content-body li').forEach(colorStars);

    // Style version badges: wrap "バージョン:" values in badge spans
    document.querySelectorAll('.content-body p, .content-body li').forEach(function(el) {
      el.innerHTML = el.innerHTML.replace(
        /(<strong>バージョン:<\/strong>\s*)([\d.]+)/g,
        '$1<span class="version-badge">v$2</span>'
      );
      el.innerHTML = el.innerHTML.replace(
        /(<strong>カテゴリ:<\/strong>\s*)([^<]+?)(?=<|$)/g,
        function(match, prefix, category) {
          var cat = category.trim();
          var cls = 'category-badge';
          if (cat.match(/Agent/i)) cls += ' cat-agent';
          else if (cat.match(/Config|Enterprise/i)) cls += ' cat-config';
          else if (cat.match(/DX|UI/i)) cls += ' cat-dx';
          else if (cat.match(/Hook|Extensib/i)) cls += ' cat-hooks';
          else if (cat.match(/MCP/i)) cls += ' cat-mcp';
          return prefix + '<span class="' + cls + '">' + cat + '</span>';
        }
      );
    });

    // Add active class to current nav link
    var path = window.location.pathname.replace(/\/$/, '').split('/').pop() || '';
    document.querySelectorAll('.header-nav a').forEach(function(a) {
      var href = a.getAttribute('href').replace(/\/$/, '').split('/').pop() || '';
      if (href === path) a.classList.add('nav-active');
    });
  })();
  </script>
</body>
</html>
